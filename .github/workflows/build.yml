name: Build Image

on:
  push:
    branches:
      - main
    tags:
      - v*

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PROJECT_NAME: innocenz-backend
      DOCKERHUB_NAMESPACE: juneyou

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${DOCKERHUB_NAMESPACE}/${PROJECT_NAME}"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          REF_NAME="${GITHUB_REF_NAME}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "$REF_NAME" == v* ]]; then
            VERSION="${REF_NAME#v}"
            TAGS="${IMAGE}:beta-${VERSION},${IMAGE}:beta"
          else
            TAGS="${IMAGE}:0.0.0-${SHORT_SHA},${IMAGE}:beta"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Building tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max