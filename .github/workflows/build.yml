name: Build Image

on:
  push:
    branches:
      - main
      - staging
    tags:
      - v*
  pull_request:
    types: [closed]
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    if: ${{ github.event_name == 'push' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: innocenz-backend
      DOCKERHUB_NAMESPACE: juneyou

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          REF_TYPE="${GITHUB_REF_TYPE:-}"
          REF_NAME="${GITHUB_REF_NAME:-}"

          if [ "$REF_TYPE" = "tag" ] && [[ "$REF_NAME" == v* ]]; then
            VERSION="${REF_NAME#v}"
          elif [ "$REF_NAME" = "staging" ]; then
            SHORT_SHA="$(git rev-parse --short=7 HEAD)"
            VERSION="0.0.0-${SHORT_SHA}-staging"
          else
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [ -z "$TAG" ]; then
              SHORT_SHA="$(git rev-parse --short=7 HEAD)"
              VERSION="0.0.0-${SHORT_SHA}"
            else
              VERSION="${TAG#v}"
            fi
          fi

          IMAGE="${DOCKERHUB_NAMESPACE}/${PROJECT_NAME}"

          if [ "$REF_NAME" = "staging" ] || [[ "$VERSION" == *"-staging" ]]; then
            STAGING_VERSION="${VERSION%-staging}"
            TAGS="${IMAGE}:staging-${STAGING_VERSION},${IMAGE}:staging-latest"
          else
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
